name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Unit tests
        run: |
          chmod +x gradlew
          ./gradlew :destination-starrocks:test --console=plain

      - name: Spec smoke
        run: ./gradlew :destination-starrocks:run --args="--spec" --console=plain
