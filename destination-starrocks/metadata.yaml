  # Required for Bulk-Load CDK destinations: the platform only populates the per-stream
  # generationId/minimumGenerationId/syncId (which DestinationStreamFactory requires, non-null) for
  # destinations that declare refresh support. Without it the platform sends null generationId and
  # the CDK throws "getGenerationId(...) must not be null" before any write. (A raw custom-image
  # registration does NOT read this file, so a custom-registered connector still needs the platform's
  # actor_definition_version.supports_refreshes flag set.)
  supportsRefreshes: true
